<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>누비 피하기 웹 버전</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("png/시작화면.png");
      background-size: cover;
      background-position: center;
      filter: blur(12px);
      transform: scale(1.08);
      opacity: 0.55;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: -1;
    }

    canvas {
      border: 3px solid white;
      background: black;
      cursor: pointer;
      z-index: 1;
    }

    #mobileControls {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 35px;
      margin-top: 10px;
      z-index: 5;
    }

    #mobileControls.show {
      display: none;
    }

    #mobileControls button {
      width: 90px;
      height: 90px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #mobileControls img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #mobileControls button.pressed img {
      filter: brightness(55%);
      transform: scale(0.95);
    }

    /* 모바일에서만 이동 버튼 보이기 */
    @media (max-width: 768px), (pointer: coarse) {
      #mobileControls.show {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="800"></canvas>

  <div id="mobileControls">
    <button id="leftBtn">
      <img src="png/버튼/모바일 이동 버튼/왼쪽 버튼.png" alt="왼쪽">
    </button>

    <button id="rightBtn">
      <img src="png/버튼/모바일 이동 버튼/오른쪽 버튼.png" alt="오른쪽">
    </button>
  </div>

  <audio id="mainBgm" src="sound/배경음악/메인화면.mp3" loop></audio>
  <audio id="playBgm" src="sound/배경음악/플레이 음악.mp3" loop></audio>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const mobileControls = document.getElementById("mobileControls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    let mobileLeft = false;
    let mobileRight = false;

    const mainBgm = document.getElementById("mainBgm");
    const playBgm = document.getElementById("playBgm");

    mainBgm.volume = 0.8;
    playBgm.volume = 0.8;

    let gameState = "start";
    let keys = {};
    let mainBgmStarted = false;

    function showMobileControls() {
      mobileControls.classList.add("show");
    }

    function hideMobileControls() {
      mobileControls.classList.remove("show");
      mobileLeft = false;
      mobileRight = false;
      leftBtn.classList.remove("pressed");
      rightBtn.classList.remove("pressed");
    }

    function pressLeft(e) {
      if (e) e.preventDefault();
      mobileLeft = true;
      leftBtn.classList.add("pressed");
    }

    function releaseLeft(e) {
      if (e) e.preventDefault();
      mobileLeft = false;
      leftBtn.classList.remove("pressed");
    }

    function pressRight(e) {
      if (e) e.preventDefault();
      mobileRight = true;
      rightBtn.classList.add("pressed");
    }

    function releaseRight(e) {
      if (e) e.preventDefault();
      mobileRight = false;
      rightBtn.classList.remove("pressed");
    }

    leftBtn.addEventListener("touchstart", pressLeft, { passive: false });
    leftBtn.addEventListener("touchend", releaseLeft, { passive: false });
    leftBtn.addEventListener("touchcancel", releaseLeft, { passive: false });

    rightBtn.addEventListener("touchstart", pressRight, { passive: false });
    rightBtn.addEventListener("touchend", releaseRight, { passive: false });
    rightBtn.addEventListener("touchcancel", releaseRight, { passive: false });

    leftBtn.addEventListener("mousedown", pressLeft);
    leftBtn.addEventListener("mouseup", releaseLeft);
    leftBtn.addEventListener("mouseleave", releaseLeft);

    rightBtn.addEventListener("mousedown", pressRight);
    rightBtn.addEventListener("mouseup", releaseRight);
    rightBtn.addEventListener("mouseleave", releaseRight);

    document.addEventListener("mouseup", function() {
      releaseLeft();
      releaseRight();
    });

    function playMainBgm() {
      playBgm.pause();
      playBgm.currentTime = 0;

      mainBgm.currentTime = 0;
      mainBgm.play();
    }

    function playPlayBgm() {
      mainBgm.pause();
      mainBgm.currentTime = 0;

      playBgm.currentTime = 0;
      playBgm.play();
    }

    const startImg = new Image();
    startImg.src = "png/시작화면.png";

    const bgImg = new Image();
    bgImg.src = "png/전투배경.png";

    const startButtonImg = new Image();
    startButtonImg.src = "png/버튼/시작 버튼/시작!.png";

    const startButtonHoverImg = new Image();
    startButtonHoverImg.src = "png/버튼/시작 버튼/시작! 선택됨.png";

    const enemyImg = new Image();
    enemyImg.src = "png/적/뉴비.png";

    const gameOverImg = new Image();
    gameOverImg.src = "png/게임 오버.png";

    const retryButtonImg = new Image();
    retryButtonImg.src = "png/버튼/다시 버튼/다시 버튼.png";

    const retryButtonHoverImg = new Image();
    retryButtonHoverImg.src = "png/버튼/다시 버튼/다시 버튼_선택됨.png";

    const playerImages = {
      front: new Image(),
      right1: new Image(),
      rightIdle: new Image(),
      right2: new Image(),
      left1: new Image(),
      leftIdle: new Image(),
      left2: new Image()
    };

    playerImages.front.src = "png/주인공/주인공_앞.png";

    playerImages.right1.src = "png/주인공/주인공_오른쪽 이동 1.png";
    playerImages.rightIdle.src = "png/주인공/주인공_오른쪽 이동 대기.png";
    playerImages.right2.src = "png/주인공/주인공_오른쪽 이동 2.png";

    playerImages.left1.src = "png/주인공/주인공_왼쪽 이동 1.png";
    playerImages.leftIdle.src = "png/주인공/주인공_왼쪽 이동 대기.png";
    playerImages.left2.src = "png/주인공/주인공_왼쪽 이동 2.png";

    let loadedCount = 0;
    const totalImages = 15;

    function imageLoaded() {
      loadedCount++;

      if (loadedCount === totalImages) {
        requestAnimationFrame(gameLoop);
      }
    }

    startImg.onload = imageLoaded;
    bgImg.onload = imageLoaded;
    startButtonImg.onload = imageLoaded;
    startButtonHoverImg.onload = imageLoaded;
    enemyImg.onload = imageLoaded;
    gameOverImg.onload = imageLoaded;
    retryButtonImg.onload = imageLoaded;
    retryButtonHoverImg.onload = imageLoaded;

    playerImages.front.onload = imageLoaded;
    playerImages.right1.onload = imageLoaded;
    playerImages.rightIdle.onload = imageLoaded;
    playerImages.right2.onload = imageLoaded;
    playerImages.left1.onload = imageLoaded;
    playerImages.leftIdle.onload = imageLoaded;
    playerImages.left2.onload = imageLoaded;

    let startAlpha = 0;
    let showButton = false;
    let isHoverStartButton = false;

    const startButton = {
      x: 300,
      y: 590,
      width: 200,
      height: 70
    };

    const retryButton = {
      x: 300,
      y: 650,
      width: 200,
      height: 70
    };

    let retryButtonAlpha = 0;
    let showRetryButton = false;
    let isHoverRetryButton = false;

    const player = {
      x: 355,
      y: 570,
      width: 90,
      height: 155,
      speed: 6
    };

    let hp = 70;
    const maxHp = 70;

    let score = 0;
    let recentScore = 0;
    let bestScore = Number(localStorage.getItem("bestScore")) || 0;

    let scoreTimer = 0;
    let gameOver = false;

    let obstacles = [];
    let spawnTimer = 0;

    let gameOverPhase = "none";
    let fadeAlpha = 0;
    let gameOverStartTime = 0;

    let currentPlayerImg = playerImages.front;
    let moveDirection = "front";
    let lastMoveTime = Date.now();

    let animIndex = 0;
    let animTimer = 0;

    const rightAnim = [
      playerImages.right1,
      playerImages.rightIdle,
      playerImages.right2,
      playerImages.rightIdle
    ];

    const leftAnim = [
      playerImages.left1,
      playerImages.leftIdle,
      playerImages.left2,
      playerImages.leftIdle
    ];

    document.addEventListener("keydown", function(e) {
      keys[e.key] = true;

      if (!mainBgmStarted && gameState === "start") {
        mainBgmStarted = true;
        mainBgm.play();
      }
    });

    document.addEventListener("keyup", function(e) {
      keys[e.key] = false;
    });

    document.addEventListener("click", function() {
      if (!mainBgmStarted && gameState === "start") {
        mainBgmStarted = true;
        mainBgm.play();
      }
    });

    function gameLoop() {
      update();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (gameState === "start") {
        drawStartScreen();
      }

      if (gameState === "play") {
        drawGameScreen();
      }

      requestAnimationFrame(gameLoop);
    }

    function update() {
      if (gameState !== "play") return;

      if (gameOver) {
        updateGameOverEffect();
        return;
      }

      let moving = false;

      if (keys["ArrowLeft"] || keys["a"] || keys["A"] || mobileLeft) {
        player.x -= player.speed;
        moveDirection = "left";
        moving = true;
        lastMoveTime = Date.now();
      }

      if (keys["ArrowRight"] || keys["d"] || keys["D"] || mobileRight) {
        player.x += player.speed;
        moveDirection = "right";
        moving = true;
        lastMoveTime = Date.now();
      }

      if (player.x < 0) {
        player.x = 0;
      }

      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      updatePlayerAnimation(moving);

      scoreTimer++;
      if (scoreTimer >= 60) {
        score += 50;
        scoreTimer = 0;
      }

      const level = Math.floor(score / 500);
      const spawnDelay = Math.max(45 - level * 3, 20);

      spawnTimer++;

      if (spawnTimer > spawnDelay) {
        const enemyCount = Math.min(1 + Math.floor(level / 2), 4);

        for (let i = 0; i < enemyCount; i++) {
          spawnObstacle();
        }

        spawnTimer = 0;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        ob.y += ob.speed;

        if (isColliding(player, ob)) {
          obstacles.splice(i, 1);
          hp -= 10;

          if (hp <= 0) {
            hp = 0;
            startGameOver();
          }
        }

        if (ob.y > canvas.height) {
          obstacles.splice(i, 1);
        }
      }
    }

    function updatePlayerAnimation(moving) {
      if (moving) {
        animTimer++;

        if (animTimer > 8) {
          animIndex++;

          if (animIndex > 3) {
            animIndex = 0;
          }

          animTimer = 0;
        }

        if (moveDirection === "right") {
          currentPlayerImg = rightAnim[animIndex];
        }

        if (moveDirection === "left") {
          currentPlayerImg = leftAnim[animIndex];
        }
      } else {
        animTimer = 0;
        animIndex = 1;

        if (moveDirection === "right") {
          currentPlayerImg = playerImages.rightIdle;
        }

        if (moveDirection === "left") {
          currentPlayerImg = playerImages.leftIdle;
        }

        if (Date.now() - lastMoveTime >= 500) {
          moveDirection = "front";
          currentPlayerImg = playerImages.front;
        }
      }
    }

    function spawnObstacle() {
      const level = Math.floor(score / 500);

      const size = Math.min(60 + level * 3, 85);
      const speed = Math.min(Math.random() * 3 + 3 + level * 0.35, 9);

      obstacles.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: speed
      });
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function startGameOver() {
      gameOver = true;
      recentScore = score;

      hideMobileControls();

      playMainBgm();

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
      }

      gameOverPhase = "darken";
      fadeAlpha = 0;
      gameOverStartTime = 0;
      retryButtonAlpha = 0;
      showRetryButton = false;
      isHoverRetryButton = false;
    }

    function updateGameOverEffect() {
      if (gameOverPhase === "darken") {
        fadeAlpha += 0.025;

        if (fadeAlpha >= 1) {
          fadeAlpha = 1;
          gameOverPhase = "brighten";
        }
      } else if (gameOverPhase === "brighten") {
        fadeAlpha -= 0.025;

        if (fadeAlpha <= 0) {
          fadeAlpha = 0;
          gameOverPhase = "result";
          gameOverStartTime = Date.now();
        }
      } else if (gameOverPhase === "result") {
        if (Date.now() - gameOverStartTime >= 2000) {
          showRetryButton = true;
        }

        if (showRetryButton && retryButtonAlpha < 1) {
          retryButtonAlpha += 0.02;

          if (retryButtonAlpha > 1) {
            retryButtonAlpha = 1;
          }
        }
      }
    }

    function drawStartScreen() {
      hideMobileControls();

      ctx.globalAlpha = startAlpha;
      ctx.drawImage(startImg, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;

      if (startAlpha < 1) {
        startAlpha += 0.01;

        if (startAlpha >= 1) {
          startAlpha = 1;
          showButton = true;
        }
      }

      if (showButton) {
        const buttonImg = isHoverStartButton ? startButtonHoverImg : startButtonImg;

        ctx.drawImage(
          buttonImg,
          startButton.x,
          startButton.y,
          startButton.width,
          startButton.height
        );
      }

      drawMainCredits();
      drawControlGuide();
    }

    function drawMainCredits() {
      ctx.font = "14px Arial";
      ctx.textAlign = "left";

      const line1 = "BGM: 베이컨 97 | TTS: Typecast 호빈";
      const line2 = "If I Had a Chicken - Kevin MacLeod";

      const x = 10;
      const y1 = canvas.height - 32;
      const y2 = canvas.height - 12;

      ctx.lineWidth = 4;
      ctx.strokeStyle = "black";
      ctx.strokeText(line1, x, y1);
      ctx.strokeText(line2, x, y2);

      ctx.fillStyle = "rgba(190, 190, 190, 0.95)";
      ctx.fillText(line1, x, y1);
      ctx.fillText(line2, x, y2);
    }

    function drawControlGuide() {
      ctx.font = "15px Arial";
      ctx.textAlign = "right";

      const line1 = "PC용 조작키: A / D";
      const line2 = "모바일용도 있습니다";

      const x = canvas.width - 10;
      const y1 = canvas.height - 32;
      const y2 = canvas.height - 12;

      ctx.lineWidth = 4;
      ctx.strokeStyle = "black";
      ctx.strokeText(line1, x, y1);
      ctx.strokeText(line2, x, y2);

      ctx.fillStyle = "rgba(190, 190, 190, 0.95)";
      ctx.fillText(line1, x, y1);
      ctx.fillText(line2, x, y2);
    }

    function drawGameScreen() {
      if (gameOverPhase === "brighten" || gameOverPhase === "result") {
        hideMobileControls();

        drawGameOverScreen();

        if (gameOverPhase === "brighten") {
          ctx.fillStyle = "rgba(0, 0, 0, " + fadeAlpha + ")";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        return;
      }

      if (!gameOver) {
        showMobileControls();
      }

      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

      for (const ob of obstacles) {
        ctx.drawImage(enemyImg, ob.x, ob.y, ob.width, ob.height);
      }

      ctx.drawImage(
        currentPlayerImg,
        player.x,
        player.y,
        player.width,
        player.height
      );

      drawHpBar();
      drawScoreText();

      if (gameOverPhase === "darken") {
        ctx.fillStyle = "rgba(0, 0, 0, " + fadeAlpha + ")";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawHpBar() {
      const barX = 20;
      const barY = 20;
      const barWidth = 230;
      const barHeight = 35;

      ctx.fillStyle = "black";
      ctx.fillRect(barX, barY, barWidth, barHeight);

      ctx.fillStyle = "lime";
      ctx.fillRect(barX, barY, barWidth * (hp / maxHp), barHeight);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 3;
      ctx.strokeRect(barX, barY, barWidth, barHeight);

      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "HP " + hp + " / " + maxHp,
        barX + barWidth / 2,
        barY + barHeight / 2
      );

      ctx.textBaseline = "alphabetic";
    }

    function drawScoreText() {
      ctx.font = "24px Arial";
      ctx.textAlign = "left";

      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.strokeText("점수: " + score, 20, 95);

      ctx.fillStyle = "white";
      ctx.fillText("점수: " + score, 20, 95);
    }

    function drawGameOverScreen() {
      ctx.drawImage(gameOverImg, 0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.font = "32px Arial";

      ctx.lineWidth = 6;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "white";

      ctx.strokeText("최근 점수: " + recentScore, canvas.width / 2, 560);
      ctx.fillText("최근 점수: " + recentScore, canvas.width / 2, 560);

      ctx.strokeText("최고 점수: " + bestScore, canvas.width / 2, 605);
      ctx.fillText("최고 점수: " + bestScore, canvas.width / 2, 605);

      if (showRetryButton) {
        const buttonImg = isHoverRetryButton ? retryButtonHoverImg : retryButtonImg;

        ctx.globalAlpha = retryButtonAlpha;
        ctx.drawImage(
          buttonImg,
          retryButton.x,
          retryButton.y,
          retryButton.width,
          retryButton.height
        );
        ctx.globalAlpha = 1;
      }
    }

    function restartGame() {
      hp = maxHp;
      score = 0;
      recentScore = 0;
      scoreTimer = 0;

      gameOver = false;
      gameOverPhase = "none";
      fadeAlpha = 0;
      gameOverStartTime = 0;

      obstacles = [];
      spawnTimer = 0;

      retryButtonAlpha = 0;
      showRetryButton = false;
      isHoverRetryButton = false;

      player.x = 355;
      player.y = 570;

      moveDirection = "front";
      currentPlayerImg = playerImages.front;
      lastMoveTime = Date.now();

      canvas.style.cursor = "default";

      showMobileControls();

      playPlayBgm();
    }

    function isMouseOnButton(mouseX, mouseY, button) {
      return (
        mouseX >= button.x &&
        mouseX <= button.x + button.width &&
        mouseY >= button.y &&
        mouseY <= button.y + button.height
      );
    }

    canvas.addEventListener("mousemove", function(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      if (gameState === "start" && showButton) {
        isHoverStartButton = isMouseOnButton(mouseX, mouseY, startButton);
      }

      if (gameState === "play" && gameOverPhase === "result" && showRetryButton) {
        isHoverRetryButton = isMouseOnButton(mouseX, mouseY, retryButton);
      }
    });

    canvas.addEventListener("mouseleave", function() {
      isHoverStartButton = false;
      isHoverRetryButton = false;
    });

    canvas.addEventListener("click", function(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      if (gameState === "start" && showButton) {
        if (isMouseOnButton(mouseX, mouseY, startButton)) {
          gameState = "play";
          canvas.style.cursor = "default";
          lastMoveTime = Date.now();

          showMobileControls();

          playPlayBgm();
        }
      }

      if (gameState === "play" && gameOverPhase === "result" && showRetryButton) {
        if (isMouseOnButton(mouseX, mouseY, retryButton)) {
          restartGame();
        }
      }
    });
  </script>
</body>
</html>
