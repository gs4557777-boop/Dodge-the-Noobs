<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>누비 피하기 웹 버전</title>

   <link rel="icon" type="image/png" href="./png/주인공/주인공_오른쪽%20이동%202.png?v=2">
  <link rel="shortcut icon" type="image/png" href="./png/주인공/주인공_오른쪽%20이동%202.png?v=2">
  <link rel="apple-touch-icon" href="./png/주인공/주인공_오른쪽%20이동%202.png?v=2">

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("png/시작화면.png");
      background-size: cover;
      background-position: center;
      filter: blur(12px);
      transform: scale(1.08);
      opacity: 0.55;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: -1;
    }

    canvas {
      border: 3px solid white;
      background: black;
      cursor: pointer;
      z-index: 1;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #mobileControls {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 55px;
      margin-top: -5px;
      z-index: 5;
      touch-action: none;
      user-select: none;
    }

    #mobileControls.show {
      display: none;
    }

    #mobileControls button {
      width: 145px;
      height: 145px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #mobileControls img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #mobileControls button.pressed img {
      filter: brightness(55%);
      transform: scale(0.95);
    }

    /* 모바일에서만 화면 크기 조정 + 이동 버튼 표시 */
    @media (max-width: 768px), (pointer: coarse) {
      body {
        justify-content: center;
      }

      canvas {
        width: 96vw;
        height: 96vw;
        max-width: 800px;
        max-height: calc(100vh - 190px);
        transform: translateY(-18px);
      }

      #mobileControls.show {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="800"></canvas>

  <div id="mobileControls">
    <button id="leftBtn">
      <img src="png/버튼/모바일 이동 버튼/왼쪽 버튼.png" alt="왼쪽">
    </button>

    <button id="rightBtn">
      <img src="png/버튼/모바일 이동 버튼/오른쪽 버튼.png" alt="오른쪽">
    </button>
  </div>

  <audio id="mainBgm" src="sound/배경음악/메인화면.mp3" loop preload="auto"></audio>
  <audio id="playBgm" src="sound/배경음악/플레이 음악.mp3" loop preload="auto"></audio>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const mobileControls = document.getElementById("mobileControls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    let mobileLeft = false;
    let mobileRight = false;

    const mainBgm = document.getElementById("mainBgm");
    const playBgm = document.getElementById("playBgm");

    mainBgm.volume = 0.8;
    playBgm.volume = 0.8;

    let gameState = "start";
    let keys = {};
    let mainBgmStarted = false;

    function showMobileControls() {
      if (!mobileControls.classList.contains("show")) {
        mobileControls.classList.add("show");
      }
    }

    function releaseMobileControls() {
      mobileLeft = false;
      mobileRight = false;
      leftBtn.classList.remove("pressed");
      rightBtn.classList.remove("pressed");
    }

    function hideMobileControls() {
      if (mobileControls.classList.contains("show")) {
        mobileControls.classList.remove("show");
      }
      releaseMobileControls();
    }

    function pressLeft(e) {
      if (e) e.preventDefault();
      unlockAudioByGesture();
      mobileLeft = true;
      leftBtn.classList.add("pressed");
    }

    function releaseLeft(e) {
      if (e) e.preventDefault();
      mobileLeft = false;
      leftBtn.classList.remove("pressed");
    }

    function pressRight(e) {
      if (e) e.preventDefault();
      unlockAudioByGesture();
      mobileRight = true;
      rightBtn.classList.add("pressed");
    }

    function releaseRight(e) {
      if (e) e.preventDefault();
      mobileRight = false;
      rightBtn.classList.remove("pressed");
    }

    leftBtn.addEventListener("touchstart", pressLeft, { passive: false });
    leftBtn.addEventListener("touchend", releaseLeft, { passive: false });
    leftBtn.addEventListener("touchcancel", releaseLeft, { passive: false });

    rightBtn.addEventListener("touchstart", pressRight, { passive: false });
    rightBtn.addEventListener("touchend", releaseRight, { passive: false });
    rightBtn.addEventListener("touchcancel", releaseRight, { passive: false });

    leftBtn.addEventListener("mousedown", pressLeft);
    leftBtn.addEventListener("mouseup", releaseLeft);
    leftBtn.addEventListener("mouseleave", releaseLeft);

    rightBtn.addEventListener("mousedown", pressRight);
    rightBtn.addEventListener("mouseup", releaseRight);
    rightBtn.addEventListener("mouseleave", releaseRight);

    document.addEventListener("mouseup", releaseMobileControls);
    document.addEventListener("touchend", releaseMobileControls, { passive: false });
    document.addEventListener("touchcancel", releaseMobileControls, { passive: false });

    window.addEventListener("blur", releaseMobileControls);
    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        releaseMobileControls();
        lastFrameTime = 0;
      }
    });

    let audioPrepared = false;
    let audioUnlocked = false;
    let currentMusic = null;

    function prepareAudioOnce() {
      if (audioPrepared) return;
      audioPrepared = true;

      try {
        mainBgm.preload = "auto";
        playBgm.preload = "auto";
        mainBgm.load();
        playBgm.load();
      } catch (err) {
        // 오디오 준비 실패해도 게임은 계속 진행
      }
    }

    prepareAudioOnce();

    function safeResetAudio(audio) {
      try {
        if (audio && Number.isFinite(audio.duration)) {
          audio.currentTime = 0;
        } else if (audio) {
          audio.currentTime = 0;
        }
      } catch (err) {
        // 아직 로딩 전이면 currentTime 변경이 막힐 수 있음
      }
    }

    function safePlay(audio) {
      if (!audio) return;

      try {
        if (!audio.paused && !audio.ended) {
          return;
        }

        const playPromise = audio.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(function() {
            // 모바일 브라우저가 막으면 다음 터치 때 다시 재생 시도됨
          });
        }
      } catch (err) {
        // 오디오 오류가 게임 루프를 죽이지 않게 막음
      }
    }

    function pauseAudio(audio) {
      try {
        if (audio) audio.pause();
      } catch (err) {
        // 무시
      }
    }

    function switchMusic(targetAudio, restart) {
      if (!targetAudio) return;
      prepareAudioOnce();

      const otherAudio = targetAudio === mainBgm ? playBgm : mainBgm;

      // 핵심: 같은 노래를 다시 요청하면 절대 currentTime을 0으로 돌리지 않음.
      // 그래서 화면 클릭/터치로 음악이 처음부터 다시 시작하지 않음.
      if (currentMusic === targetAudio) {
        safePlay(targetAudio);
        return;
      }

      pauseAudio(otherAudio);
      safeResetAudio(otherAudio);

      currentMusic = targetAudio;

      if (restart !== false) {
        safeResetAudio(targetAudio);
      }

      safePlay(targetAudio);
    }

    function playMainBgm(restart) {
      switchMusic(mainBgm, restart !== false);
    }

    function playPlayBgm(restart) {
      switchMusic(playBgm, restart !== false);
    }

    function unlockAudioByGesture() {
      prepareAudioOnce();
      audioUnlocked = true;

      if (!currentMusic) {
        currentMusic = gameState === "play" && !gameOver ? playBgm : mainBgm;
      }

      safePlay(currentMusic);
    }

    // 모바일 첫 터치에서 오디오 잠금 해제만 함. 같은 노래면 다시 시작하지 않음.
    document.addEventListener("pointerdown", unlockAudioByGesture, { passive: true });
    document.addEventListener("touchstart", unlockAudioByGesture, { passive: true });

    const startImg = new Image();
    startImg.src = "png/시작화면.png";

    const bgImg = new Image();
    bgImg.src = "png/전투배경.png";

    const startButtonImg = new Image();
    startButtonImg.src = "png/버튼/시작 버튼/시작!.png";

    const startButtonHoverImg = new Image();
    startButtonHoverImg.src = "png/버튼/시작 버튼/시작! 선택됨.png";

    const enemyImg = new Image();
    enemyImg.src = "png/적/뉴비.png";

    const fireEnemyImg = new Image();
    fireEnemyImg.src = "png/적/불뉴비.png";

    const rapidEnemyImg = new Image();
    rapidEnemyImg.src = "png/적/급격히떨어지는뉴비.png";

    const angelEnemyImg = new Image();
    angelEnemyImg.src = "png/적/천사 뉴비.png";

    const bombImg = new Image();
    bombImg.src = "png/아이템/폭탄.png";

    const healthPotionImg = new Image();
    healthPotionImg.src = "png/아이템/체력음료.png";

    const invincibleEffectImg = new Image();
    invincibleEffectImg.src = "png/효과/무적상태표시.png";

    const stunnedPlayerImg = new Image();
    stunnedPlayerImg.src = "png/주인공/주인공_기절.png";

    const gameOverImg = new Image();
    gameOverImg.src = "png/게임 오버.png";

    const retryButtonImg = new Image();
    retryButtonImg.src = "png/버튼/다시 버튼/다시 버튼.png";

    const retryButtonHoverImg = new Image();
    retryButtonHoverImg.src = "png/버튼/다시 버튼/다시 버튼_선택됨.png";

    const playerImages = {
      front: new Image(),
      right1: new Image(),
      rightIdle: new Image(),
      right2: new Image(),
      left1: new Image(),
      leftIdle: new Image(),
      left2: new Image()
    };

    playerImages.front.src = "png/주인공/주인공_앞.png";

    playerImages.right1.src = "png/주인공/주인공_오른쪽 이동 1.png";
    playerImages.rightIdle.src = "png/주인공/주인공_오른쪽 이동 대기.png";
    playerImages.right2.src = "png/주인공/주인공_오른쪽 이동 2.png";

    playerImages.left1.src = "png/주인공/주인공_왼쪽 이동 1.png";
    playerImages.leftIdle.src = "png/주인공/주인공_왼쪽 이동 대기.png";
    playerImages.left2.src = "png/주인공/주인공_왼쪽 이동 2.png";

    let loadedCount = 0;
    const totalImages = 22;
    let loopStarted = false;

    function imageLoaded() {
      loadedCount++;

      if (loadedCount >= totalImages && !loopStarted) {
        loopStarted = true;
        requestAnimationFrame(gameLoop);
      }
    }

    function watchImage(img, name) {
      let done = false;

      function finish() {
        if (done) return;
        done = true;
        imageLoaded();
      }

      img.onload = finish;
      img.onerror = function() {
        console.warn("이미지 로딩 실패:", name, img.src);
        finish();
      };

      // 캐시 때문에 onload가 이미 지나간 이미지도 게임이 멈추지 않게 처리
      if (img.complete) {
        finish();
      }
    }

    const imageList = [
      [startImg, "시작화면"],
      [bgImg, "전투배경"],
      [startButtonImg, "시작 버튼"],
      [startButtonHoverImg, "시작 버튼 선택됨"],
      [enemyImg, "뉴비"],
      [fireEnemyImg, "불뉴비"],
      [rapidEnemyImg, "급격히떨어지는뉴비"],
      [angelEnemyImg, "천사 뉴비"],
      [bombImg, "폭탄"],
      [healthPotionImg, "체력음료"],
      [invincibleEffectImg, "무적상태표시"],
      [stunnedPlayerImg, "주인공 기절"],
      [gameOverImg, "게임 오버"],
      [retryButtonImg, "다시 버튼"],
      [retryButtonHoverImg, "다시 버튼 선택됨"],
      [playerImages.front, "주인공 앞"],
      [playerImages.right1, "주인공 오른쪽 이동 1"],
      [playerImages.rightIdle, "주인공 오른쪽 이동 대기"],
      [playerImages.right2, "주인공 오른쪽 이동 2"],
      [playerImages.left1, "주인공 왼쪽 이동 1"],
      [playerImages.leftIdle, "주인공 왼쪽 이동 대기"],
      [playerImages.left2, "주인공 왼쪽 이동 2"]
    ];

    for (const item of imageList) {
      watchImage(item[0], item[1]);
    }

    let startAlpha = 0;
    let showButton = false;
    let isHoverStartButton = false;

    const startButton = {
      x: 300,
      y: 590,
      width: 200,
      height: 70
    };

    const retryButton = {
      x: 300,
      y: 650,
      width: 200,
      height: 70
    };

    let retryButtonAlpha = 0;
    let showRetryButton = false;
    let isHoverRetryButton = false;

    const player = {
      x: 355,
      y: 570,
      width: 90,
      height: 155,
      speed: 6
    };

    const baseMaxHp = 70;
    let maxHp = baseMaxHp;
    let hp = maxHp;

    let score = 0;
    let recentScore = 0;
    let bestScore = Number(localStorage.getItem("bestScore")) || 0;

    let scoreTimer = 0;
    let gameOver = false;

    let damageFreeTimer = 0;
    let damageFreeRequirement = 60 * 15;
    const damageFreeRequirementIncrease = 60 * 5;

    let bonusTexts = [];

    let burnEffectTimer = 0;
    const burnEffectDuration = 60 * 4;
    let burnDamageTimer = 0;

    let invincibleTimer = 0;
    const invincibleDuration = 60 * 1.5;

    let stunTimer = 0;
    const stunDuration = 60 * 1;

    let slowTimer = 0;
    const slowDuration = 60 * 5;

    let explosionEffects = [];

    // 폭탄 판정 강화
    // 모바일/PC는 캔버스 표시 크기와 체감 범위가 달라서 따로 둠
    const MOBILE_MODE_QUERY = "(max-width: 768px), (pointer: coarse)";
    const BOMB_PICKUP_PADDING = 35;
    const BOMB_EXPLOSION_RADIUS_MOBILE = 385;
    const BOMB_EXPLOSION_RADIUS_PC = 785;
    const MAX_OBSTACLES_MOBILE = 42;
    const MAX_OBSTACLES_PC = 66;
    const POTION_PICKUP_PADDING = 25;
    const POTION_START_SCORE = 1500;
    const RAPID_START_SCORE = 1800;
    const ANGEL_START_SCORE = 2500;
    const GROUND_REMOVE_OFFSET = 14;
    const ENEMY_HITBOX_SHRINK = 8;
    const RAPID_WARNING_TIME = 60 * 1.15;
    const ANGEL_WAIT_TIME = 60 * 1;

    let frameScale = 1;
    let lastFrameTime = 0;
    let cachedMobileMode = false;

    function updateDeviceMode() {
      const width = window.innerWidth || document.documentElement.clientWidth || canvas.clientWidth || canvas.width;
      const touchPoints = navigator.maxTouchPoints || navigator.msMaxTouchPoints || 0;
      cachedMobileMode = width <= 768 || touchPoints > 0 || "ontouchstart" in window;
    }

    updateDeviceMode();
    window.addEventListener("resize", updateDeviceMode);
    window.addEventListener("orientationchange", updateDeviceMode);

    function isMobileMode() {
      return cachedMobileMode;
    }

    function getBombExplosionRadius() {
      return cachedMobileMode ? BOMB_EXPLOSION_RADIUS_MOBILE : BOMB_EXPLOSION_RADIUS_PC;
    }

    function getBombVisualRadius(radius) {
      // 실제 판정은 위 radius 그대로, 화면 이펙트만 작게 그려서 모바일 렉/멈춤 방지
      return Math.min(radius, cachedMobileMode ? 260 : 360);
    }

    function getMaxObstacleLimit() {
      return cachedMobileMode ? MAX_OBSTACLES_MOBILE : MAX_OBSTACLES_PC;
    }

    function getGroundRemoveY() {
      return canvas.height - GROUND_REMOVE_OFFSET;
    }

    function getNormalEnemyDamage() {
      return score >= 1000 ? 8 : 5;
    }

    function hasObstacleType(type) {
      return obstacles.some(function(ob) {
        return ob && ob.type === type;
      });
    }

    function trimObstacles() {
      const limit = getMaxObstacleLimit();

      while (obstacles.length > limit) {
        let removeIndex = obstacles.findIndex(function(ob) {
          return ob.type !== "bomb";
        });

        if (removeIndex === -1) {
          removeIndex = 0;
        }

        obstacles.splice(removeIndex, 1);
      }
    }

    let obstacles = [];
    let spawnTimer = 0;

    let gameOverPhase = "none";
    let fadeAlpha = 0;
    let gameOverStartTime = 0;

    let currentPlayerImg = playerImages.front;
    let moveDirection = "front";
    let lastMoveTime = Date.now();

    let animIndex = 0;
    let animTimer = 0;

    const rightAnim = [
      playerImages.right1,
      playerImages.rightIdle,
      playerImages.right2,
      playerImages.rightIdle
    ];

    const leftAnim = [
      playerImages.left1,
      playerImages.leftIdle,
      playerImages.left2,
      playerImages.leftIdle
    ];

    document.addEventListener("keydown", function(e) {
      keys[e.key] = true;

      if (!mainBgmStarted && gameState === "start") {
        mainBgmStarted = true;
        playMainBgm(false);
      }

      if (gameState === "start" && showButton && (e.key === "Enter" || e.key === " ")) {
        startGame();
      }

      if (gameState === "play" && gameOverPhase === "result" && showRetryButton && (e.key === "Enter" || e.key === " ")) {
        restartGame();
      }
    });

    document.addEventListener("keyup", function(e) {
      keys[e.key] = false;
    });

    function gameLoop(timestamp) {
      try {
        if (!lastFrameTime) {
          lastFrameTime = timestamp;
        }

        const delta = timestamp - lastFrameTime;
        lastFrameTime = timestamp;

        // 모바일에서 순간 렉이 와도 다음 프레임에 계산이 폭주하지 않게 제한
        frameScale = Math.min(Math.max(delta / 16.6667, 0.5), 2.5);

        update();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === "start") {
          drawStartScreen();
        }

        if (gameState === "play") {
          drawGameScreen();
        }
      } catch (err) {
        recoverFromGameError(err);
      }

      requestAnimationFrame(gameLoop);
    }

    function recoverFromGameError(err) {
      console.error("게임 오류 복구:", err);

      releaseMobileControls();
      frameScale = 1;
      lastFrameTime = 0;

      // 오류가 나도 게임이 완전히 멈추지 않게 위험한 오브젝트만 정리
      obstacles = obstacles.filter(function(ob) {
        return ob && typeof ob.x === "number" && typeof ob.y === "number" && typeof ob.width === "number" && typeof ob.height === "number";
      });

      trimObstacles();
      explosionEffects = [];

      if (!gameOver && gameState === "play") {
        addBonusText("오류 복구됨");
      }
    }

    function update() {
      if (gameState !== "play") return;

      if (gameOver) {
        updateGameOverEffect();
        updateBonusTexts();
        updateExplosionEffects();
        return;
      }

      updateBurnEffect();
      updateInvincibleEffect();
      updateStunEffect();
      updateSlowEffect();
      if (gameOver) return;

      let moving = false;
      const isStunned = stunTimer > 0;
      const moveSpeed = getPlayerMoveSpeed();

      if (!isStunned) {
        if (keys["ArrowLeft"] || keys["a"] || keys["A"] || mobileLeft) {
          player.x -= moveSpeed * frameScale;
          moveDirection = "left";
          moving = true;
          lastMoveTime = Date.now();
        }

        if (keys["ArrowRight"] || keys["d"] || keys["D"] || mobileRight) {
          player.x += moveSpeed * frameScale;
          moveDirection = "right";
          moving = true;
          lastMoveTime = Date.now();
        }
      } else {
        releaseMobileControls();
        currentPlayerImg = stunnedPlayerImg;
        moving = false;
        lastMoveTime = Date.now();
      }

      if (player.x < 0) {
        player.x = 0;
      }

      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      if (!isStunned) {
        updatePlayerAnimation(moving);
      }

      scoreTimer += frameScale;
      if (scoreTimer >= 60) {
        score += 50;
        scoreTimer = 0;
      }

      const level = Math.floor(score / 500);
      // 난이도 추가 너프: 초보자도 버틸 수 있게 초반/중반 생성 간격을 더 넓힘
      const spawnDelay = Math.max(68 - level * 1.8, 32);

      spawnTimer += frameScale;

      if (spawnTimer > spawnDelay) {
        // 난이도 추가 너프: 한 번에 떨어지는 적 수를 더 천천히 증가
        const enemyCount = Math.min(1 + Math.floor(level / 5), 3);

        for (let i = 0; i < enemyCount; i++) {
          spawnObstacle();
        }

        spawnTimer = 0;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];

        if (!ob) {
          obstacles.splice(i, 1);
          continue;
        }

        const motionResult = updateObstacleMotion(ob, i);
        if (motionResult === "removed" || motionResult === "replaced") {
          continue;
        }

        if (motionResult === "skipCollision") {
          continue;
        }

        if (isCollidingWithObstacle(player, ob)) {
          if (isDamagingEnemyType(ob.type) && isEnemyTooLowToDamage(ob)) {
            // 주인공보다 더 낮게 지나간 적은 맞은 판정으로 안 봄
            continue;
          }

          if (stunTimer > 0 && isItemType(ob.type)) {
            // 기절 중에는 아이템을 먹지 못함
            continue;
          }

          obstacles.splice(i, 1);

          if (ob.type === "bomb") {
            triggerBomb();
            // 폭탄 처리 후 obstacles 배열이 다시 만들어지니까 이 프레임의 충돌 루프는 여기서 끊음.
            // return으로 update 전체를 끊지 않아서 화면/음악/타이머가 멈춘 것처럼 보이지 않음.
            break;
          } else if (ob.type === "potion") {
            useHealthPotion();
          } else if (ob.type === "rapid") {
            hitByRapidEnemy();
          } else if (ob.type === "angel") {
            hitByAngelEnemy();
          } else if (ob.type === "fire") {
            hitByFireEnemy();
          } else {
            takeDamage(getNormalEnemyDamage());
          }

          if (gameOver) return;
          continue;
        }

        // 바닥 판정 y를 살짝 올려서, 땅에 닿는 느낌으로 제거
        if (ob.y + ob.height >= getGroundRemoveY()) {
          obstacles.splice(i, 1);
        }
      }

      updateExplosionEffects();
      updateBonusTexts();
      updateDamageFreeReward();
    }

    function updatePlayerAnimation(moving) {
      if (moving) {
        animTimer += frameScale;

        if (animTimer > 8) {
          animIndex++;

          if (animIndex > 3) {
            animIndex = 0;
          }

          animTimer = 0;
        }

        if (moveDirection === "right") {
          currentPlayerImg = rightAnim[animIndex];
        }

        if (moveDirection === "left") {
          currentPlayerImg = leftAnim[animIndex];
        }
      } else {
        animTimer = 0;
        animIndex = 1;

        if (moveDirection === "right") {
          currentPlayerImg = playerImages.rightIdle;
        }

        if (moveDirection === "left") {
          currentPlayerImg = playerImages.leftIdle;
        }

        if (Date.now() - lastMoveTime >= 500) {
          moveDirection = "front";
          currentPlayerImg = playerImages.front;
        }
      }
    }

    function spawnObstacle() {
      const level = Math.floor(score / 500);

      // 난이도 추가 너프: 크기/속도 상승폭 완화
      const size = Math.min(56 + level * 1.5, 74);
      const speed = Math.min(Math.random() * 2.0 + 2.3 + level * 0.18, 7.2);

      let type = "normal";

      // 난이도 올라가면 가끔 불뉴비 등장
      if (level >= 2) {
        const fireChance = Math.min(0.025 + (level - 2) * 0.008, 0.10);

        if (Math.random() < fireChance) {
          type = "fire";
        }
      }

      obstacles.push({
        type: type,
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: speed
      });

      // 적이 떨어질 때마다 아주 가끔 폭탄도 같이 떨어짐
      if (Math.random() < 0.028) {
        spawnBomb();
      }

      // 1500점 이상부터 가끔 체력음료 등장. 화면에 하나만 존재하게 해서 밸런스 유지
      if (score >= POTION_START_SCORE && !hasObstacleType("potion")) {
        const potionChance = Math.min(0.025 + Math.floor((score - POTION_START_SCORE) / 1000) * 0.006, 0.06);

        if (Math.random() < potionChance) {
          spawnHealthPotion();
        }
      }

      // 1800점부터 가끔 급강하 뉴비 예고선 등장
      if (score >= RAPID_START_SCORE && !hasObstacleType("rapidWarning") && !hasObstacleType("rapid")) {
        const rapidChance = Math.min(0.014 + Math.floor((score - RAPID_START_SCORE) / 1200) * 0.004, 0.035);

        if (Math.random() < rapidChance) {
          spawnRapidWarning();
        }
      }

      // 2500점부터 아주 가끔 천사 뉴비 등장
      if (score >= ANGEL_START_SCORE && !hasObstacleType("angel")) {
        const angelChance = Math.min(0.006 + Math.floor((score - ANGEL_START_SCORE) / 1500) * 0.003, 0.018);

        if (Math.random() < angelChance) {
          spawnAngelEnemy();
        }
      }

      trimObstacles();
    }

    function spawnBomb() {
      const level = Math.floor(score / 500);
      const size = 65;
      const speed = Math.min(Math.random() * 1.8 + 3.8 + level * 0.18, 7.5);

      obstacles.push({
        type: "bomb",
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: speed
      });
    }

    function spawnHealthPotion() {
      const level = Math.floor(score / 500);
      const size = 62;
      const speed = Math.min(Math.random() * 1.5 + 3.2 + level * 0.12, 6.5);

      obstacles.push({
        type: "potion",
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: speed
      });
    }

    function spawnRapidWarning() {
      const size = 72;
      const x = Math.random() * (canvas.width - size);

      obstacles.push({
        type: "rapidWarning",
        x: x,
        y: 0,
        width: size,
        height: canvas.height,
        speed: 0,
        timer: RAPID_WARNING_TIME,
        maxTimer: RAPID_WARNING_TIME,
        enemySize: size
      });
    }

    function createRapidEnemyFromWarning(warning) {
      const level = Math.floor(score / 500);
      const size = warning.enemySize || 72;

      return {
        type: "rapid",
        x: Math.max(0, Math.min(canvas.width - size, warning.x)),
        y: -size,
        width: size,
        height: size,
        speed: Math.min(14.5 + level * 0.35, 20)
      };
    }

    function spawnAngelEnemy() {
      const size = 74;
      const x = Math.random() * (canvas.width - size);

      obstacles.push({
        type: "angel",
        phase: "wait",
        x: x,
        y: 65,
        width: size,
        height: size,
        speed: 0,
        timer: ANGEL_WAIT_TIME,
        maxTimer: ANGEL_WAIT_TIME,
        vx: 0,
        vy: 0
      });
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function getExpandedRect(rect, padding) {
      return {
        x: rect.x - padding,
        y: rect.y - padding,
        width: rect.width + padding * 2,
        height: rect.height + padding * 2
      };
    }

    function getShrunkRect(rect, shrink) {
      const safeShrink = Math.min(shrink, rect.width / 2 - 1, rect.height / 2 - 1);

      if (safeShrink <= 0) {
        return rect;
      }

      return {
        x: rect.x + safeShrink,
        y: rect.y + safeShrink,
        width: rect.width - safeShrink * 2,
        height: rect.height - safeShrink * 2
      };
    }

    function isItemType(type) {
      return type === "bomb" || type === "potion";
    }

    function isDamagingEnemyType(type) {
      return type === "normal" || type === "fire" || type === "rapid" || type === "angel";
    }

    function isCollidingWithObstacle(target, ob) {
      if (!ob || ob.type === "rapidWarning") return false;

      if (ob.type === "angel" && ob.phase === "wait") {
        return false;
      }

      if (ob.type === "bomb") {
        return isColliding(target, getExpandedRect(ob, BOMB_PICKUP_PADDING));
      }

      if (ob.type === "potion") {
        return isColliding(target, getExpandedRect(ob, POTION_PICKUP_PADDING));
      }

      if (isDamagingEnemyType(ob.type)) {
        return isColliding(target, getShrunkRect(ob, ENEMY_HITBOX_SHRINK));
      }

      return isColliding(target, ob);
    }

    function updateObstacleMotion(ob, index) {
      if (!ob) {
        obstacles.splice(index, 1);
        return "removed";
      }

      if (ob.type === "rapidWarning") {
        ob.timer -= frameScale;

        if (ob.timer <= 0) {
          obstacles[index] = createRapidEnemyFromWarning(ob);
          return "replaced";
        }

        return "skipCollision";
      }

      if (ob.type === "angel") {
        if (ob.phase === "wait") {
          ob.timer -= frameScale;
          ob.y += Math.sin(Date.now() / 140) * 0.08 * frameScale;

          if (ob.timer <= 0) {
            startAngelDash(ob);
          }

          return "skipCollision";
        }

        ob.x += ob.vx * frameScale;
        ob.y += ob.vy * frameScale;

        if (ob.y + ob.height >= getGroundRemoveY() || ob.x + ob.width < -80 || ob.x > canvas.width + 80) {
          obstacles.splice(index, 1);
          return "removed";
        }

        return "moved";
      }

      ob.y += ob.speed * frameScale;
      return "moved";
    }

    function startAngelDash(ob) {
      const level = Math.floor(score / 500);
      const obCenter = getRectCenter(ob);
      const playerCenter = getRectCenter(player);
      const targetX = playerCenter.x;
      const targetY = canvas.height + 80;
      const dx = targetX - obCenter.x;
      const dy = targetY - obCenter.y;
      const length = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
      const dashSpeed = Math.min(7.2 + level * 0.15, 10.5);

      ob.phase = "dash";
      ob.vx = (dx / length) * dashSpeed;
      ob.vy = (dy / length) * dashSpeed;
      ob.speed = dashSpeed;
    }

    function getRectCenter(rect) {
      return {
        x: rect.x + rect.width / 2,
        y: rect.y + rect.height / 2
      };
    }

    function isRectInCircle(rect, circleX, circleY, radius) {
      if (!rect || !Number.isFinite(circleX) || !Number.isFinite(circleY) || !Number.isFinite(radius)) {
        return false;
      }

      const closestX = Math.max(rect.x, Math.min(circleX, rect.x + rect.width));
      const closestY = Math.max(rect.y, Math.min(circleY, rect.y + rect.height));
      const dx = circleX - closestX;
      const dy = circleY - closestY;

      return dx * dx + dy * dy <= radius * radius;
    }

    function takeDamage(amount) {
      if (gameOver || invincibleTimer > 0) return;

      hp -= amount;
      damageFreeTimer = 0;

      if (hp <= 0) {
        hp = 0;
        startGameOver();
      }
    }

    function hitByFireEnemy() {
      if (invincibleTimer > 0) {
        addBonusText("무적 상태! 피해 무효");
        return;
      }

      const wasBurning = burnEffectTimer > 0;

      takeDamage(5);
      if (gameOver) return;

      if (!wasBurning) {
        burnEffectTimer = burnEffectDuration;
        burnDamageTimer = 0;
        addBonusText("불뉴비 효과! 4초 지속 피해");
      }
    }

    function hitByRapidEnemy() {
      if (invincibleTimer > 0) {
        addBonusText("무적 상태! 급강하 피해 무효");
        return;
      }

      takeDamage(12);
      if (gameOver) return;

      stunTimer = Math.max(stunTimer, stunDuration);
      releaseMobileControls();
      addBonusText("급강하 충돌! 1초 기절");
    }

    function hitByAngelEnemy() {
      if (invincibleTimer > 0) {
        addBonusText("무적 상태! 천사 피해 무효");
        return;
      }

      takeDamage(9);
      if (gameOver) return;

      if (slowTimer <= 0) {
        slowTimer = slowDuration;
        addBonusText("천사 뉴비 효과! 5초 감속");
      } else {
        addBonusText("이미 감속 중!");
      }
    }

    function updateInvincibleEffect() {
      if (invincibleTimer <= 0) return;

      invincibleTimer -= frameScale;

      if (invincibleTimer <= 0) {
        invincibleTimer = 0;
      }
    }

    function updateStunEffect() {
      if (stunTimer <= 0) return;

      stunTimer -= frameScale;

      if (stunTimer <= 0) {
        stunTimer = 0;
      }
    }

    function updateSlowEffect() {
      if (slowTimer <= 0) return;

      slowTimer -= frameScale;

      if (slowTimer <= 0) {
        slowTimer = 0;
      }
    }

    function getPlayerMoveSpeed() {
      if (slowTimer > 0) {
        return player.speed * 0.55;
      }

      return player.speed;
    }

    function useHealthPotion() {
      const healAmount = Math.floor(Math.random() * 11) + 5;
      hp = Math.min(maxHp, hp + healAmount);
      invincibleTimer = invincibleDuration;
      addBonusText("체력음료 +" + healAmount + " / 1.5초 무적");
    }

    function isEnemyTooLowToDamage(ob) {
      if (!ob || !isDamagingEnemyType(ob.type)) return false;

      return ob.y > player.y + player.height * 0.62;
    }

    function updateBurnEffect() {
      if (burnEffectTimer <= 0) return;

      burnEffectTimer -= frameScale;
      burnDamageTimer += frameScale;

      if (burnDamageTimer >= 60) {
        burnDamageTimer = 0;
        takeDamage(2);
      }

      if (burnEffectTimer <= 0) {
        burnEffectTimer = 0;
        burnDamageTimer = 0;
      }
    }

    function isValidObstacle(ob) {
      return (
        ob &&
        Number.isFinite(ob.x) &&
        Number.isFinite(ob.y) &&
        Number.isFinite(ob.width) &&
        Number.isFinite(ob.height) &&
        Number.isFinite(ob.speed)
      );
    }

    function triggerBomb() {
      const center = getRectCenter(player);
      const radius = getBombExplosionRadius();
      let removedCount = 0;
      const nextObstacles = [];

      // 폭탄 터질 때 splice 반복/배열 중간 변경을 피함.
      // 새 배열로 갈아끼우는 방식이라 모바일에서 멈춤 확률을 확 줄임.
      for (const ob of obstacles) {
        if (!isValidObstacle(ob)) {
          continue;
        }

        if (isDamagingEnemyType(ob.type) && isRectInCircle(ob, center.x, center.y, radius)) {
          removedCount++;
          continue;
        }

        nextObstacles.push(ob);
      }

      obstacles = nextObstacles;
      trimObstacles();

      explosionEffects = [{
        x: center.x,
        y: center.y,
        radius: getBombVisualRadius(radius),
        timer: 12,
        maxTimer: 12
      }];

      if (removedCount > 0) {
        addBonusText("폭탄 발동! 적 " + removedCount + "마리 제거");
      } else {
        addBonusText("폭탄 발동!");
      }
    }

    function updateDamageFreeReward() {
      damageFreeTimer += frameScale;

      if (damageFreeTimer < damageFreeRequirement) return;

      damageFreeTimer = 0;

      if (Math.random() < 0.5) {
        maxHp += 5;
        addBonusText("최대체력 +5");
      } else {
        hp = Math.min(hp + 10, maxHp);
        addBonusText("체력 +10");
      }

      damageFreeRequirement += damageFreeRequirementIncrease;
    }

    function addBonusText(text) {
      bonusTexts.push({
        text: text,
        timer: 120,
        maxTimer: 120
      });

      if (bonusTexts.length > 3) {
        bonusTexts.shift();
      }
    }

    function updateBonusTexts() {
      for (let i = bonusTexts.length - 1; i >= 0; i--) {
        bonusTexts[i].timer -= frameScale;

        if (bonusTexts[i].timer <= 0) {
          bonusTexts.splice(i, 1);
        }
      }
    }

    function updateExplosionEffects() {
      for (let i = explosionEffects.length - 1; i >= 0; i--) {
        explosionEffects[i].timer -= frameScale;

        if (explosionEffects[i].timer <= 0) {
          explosionEffects.splice(i, 1);
        }
      }
    }

    function resetGameplayValues() {
      maxHp = baseMaxHp;
      hp = maxHp;
      score = 0;
      recentScore = 0;
      scoreTimer = 0;

      gameOver = false;
      gameOverPhase = "none";
      fadeAlpha = 0;
      gameOverStartTime = 0;

      damageFreeTimer = 0;
      damageFreeRequirement = 60 * 15;
      bonusTexts = [];

      burnEffectTimer = 0;
      burnDamageTimer = 0;
      invincibleTimer = 0;
      stunTimer = 0;
      slowTimer = 0;
      explosionEffects = [];

      obstacles = [];
      spawnTimer = 0;

      retryButtonAlpha = 0;
      showRetryButton = false;
      isHoverRetryButton = false;

      player.x = 355;
      player.y = 570;

      moveDirection = "front";
      currentPlayerImg = playerImages.front;
      lastMoveTime = Date.now();
    }

    function startGameOver() {
      gameOver = true;
      recentScore = score;

      hideMobileControls();

      burnEffectTimer = 0;
      burnDamageTimer = 0;
      invincibleTimer = 0;
      stunTimer = 0;
      slowTimer = 0;
      damageFreeTimer = 0;
      explosionEffects = [];
      bonusTexts = [];

      playMainBgm();

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
      }

      gameOverPhase = "darken";
      fadeAlpha = 0;
      gameOverStartTime = 0;
      retryButtonAlpha = 0;
      showRetryButton = false;
      isHoverRetryButton = false;
    }

    function updateGameOverEffect() {
      if (gameOverPhase === "darken") {
        fadeAlpha += 0.025 * frameScale;

        if (fadeAlpha >= 1) {
          fadeAlpha = 1;
          gameOverPhase = "brighten";
        }
      } else if (gameOverPhase === "brighten") {
        fadeAlpha -= 0.025 * frameScale;

        if (fadeAlpha <= 0) {
          fadeAlpha = 0;
          gameOverPhase = "result";
          gameOverStartTime = Date.now();
        }
      } else if (gameOverPhase === "result") {
        if (Date.now() - gameOverStartTime >= 2000) {
          showRetryButton = true;
        }

        if (showRetryButton && retryButtonAlpha < 1) {
          retryButtonAlpha += 0.02 * frameScale;

          if (retryButtonAlpha > 1) {
            retryButtonAlpha = 1;
          }
        }
      }
    }

    function drawStartScreen() {
      hideMobileControls();

      ctx.globalAlpha = startAlpha;
      ctx.drawImage(startImg, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;

      if (startAlpha < 1) {
        startAlpha += 0.01;

        if (startAlpha >= 1) {
          startAlpha = 1;
          showButton = true;
        }
      }

      if (showButton) {
        const buttonImg = isHoverStartButton ? startButtonHoverImg : startButtonImg;

        ctx.drawImage(
          buttonImg,
          startButton.x,
          startButton.y,
          startButton.width,
          startButton.height
        );
      }

      drawMainCredits();
      drawControlGuide();
    }

    function drawMainCredits() {
      ctx.font = "14px Arial";
      ctx.textAlign = "left";

      const line1 = "BGM: 베이컨 97 | TTS: Typecast 호빈";
      const line2 = "If I Had a Chicken - Kevin MacLeod";

      const x = 10;
      const y1 = canvas.height - 32;
      const y2 = canvas.height - 12;

      ctx.lineWidth = 4;
      ctx.strokeStyle = "black";
      ctx.strokeText(line1, x, y1);
      ctx.strokeText(line2, x, y2);

      ctx.fillStyle = "rgba(190, 190, 190, 0.95)";
      ctx.fillText(line1, x, y1);
      ctx.fillText(line2, x, y2);
    }

    function drawControlGuide() {
      ctx.font = "15px Arial";
      ctx.textAlign = "right";

      const line1 = "조작법";
      const line2 = "PC: A / D  |  모바일: 왼쪽 / 오른쪽 버튼";

      const x = canvas.width - 10;
      const y1 = canvas.height - 32;
      const y2 = canvas.height - 12;

      ctx.lineWidth = 4;
      ctx.strokeStyle = "black";
      ctx.strokeText(line1, x, y1);
      ctx.strokeText(line2, x, y2);

      ctx.fillStyle = "rgba(190, 190, 190, 0.95)";
      ctx.fillText(line1, x, y1);
      ctx.fillText(line2, x, y2);
    }

    function drawGameScreen() {
      if (gameOverPhase === "brighten" || gameOverPhase === "result") {
        hideMobileControls();

        drawGameOverScreen();

        if (gameOverPhase === "brighten") {
          ctx.fillStyle = "rgba(0, 0, 0, " + fadeAlpha + ")";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        return;
      }

      if (!gameOver) {
        showMobileControls();
      }

      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

      for (const ob of obstacles) {
        drawObstacle(ob);
      }

      ctx.drawImage(
        currentPlayerImg,
        player.x,
        player.y,
        player.width,
        player.height
      );

      drawInvincibleEffect();
      drawExplosionEffects();
      drawBurnOverlay();
      drawSlowOverlay();
      drawStunText();

      drawHpBar();
      drawScoreText();
      drawBonusTexts();

      if (gameOverPhase === "darken") {
        ctx.fillStyle = "rgba(0, 0, 0, " + fadeAlpha + ")";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawObstacle(ob) {
      if (!ob) return;

      if (ob.type === "rapidWarning") {
        drawRapidWarning(ob);
        return;
      }

      let img = enemyImg;

      if (ob.type === "fire") {
        img = fireEnemyImg;
      }

      if (ob.type === "rapid") {
        img = rapidEnemyImg;
      }

      if (ob.type === "angel") {
        img = angelEnemyImg;
      }

      if (ob.type === "bomb") {
        img = bombImg;
      }

      if (ob.type === "potion") {
        img = healthPotionImg;
      }

      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, ob.x, ob.y, ob.width, ob.height);
        return;
      }

      // 이미지가 없을 때도 게임이 멈추지 않게 임시 표시
      if (ob.type === "bomb") {
        ctx.fillStyle = "yellow";
      } else if (ob.type === "potion") {
        ctx.fillStyle = "lime";
      } else if (ob.type === "rapid") {
        ctx.fillStyle = "crimson";
      } else if (ob.type === "angel") {
        ctx.fillStyle = "gold";
      } else if (ob.type === "fire") {
        ctx.fillStyle = "red";
      } else {
        ctx.fillStyle = "white";
      }

      ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
    }

    function drawRapidWarning(ob) {
      const progress = 1 - Math.max(0, Math.min(1, ob.timer / ob.maxTimer));
      const alpha = 0.18 + progress * 0.46;
      const lineX = ob.x + ob.width / 2;
      const lineWidth = ob.width * (0.72 + progress * 0.28);

      ctx.save();
      ctx.fillStyle = "rgba(255, 0, 0, " + alpha + ")";
      ctx.fillRect(lineX - lineWidth / 2, 0, lineWidth, canvas.height);

      ctx.strokeStyle = "rgba(255, 220, 220, " + Math.min(0.8, alpha + 0.15) + ")";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(lineX, 0);
      ctx.lineTo(lineX, canvas.height);
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.font = "22px Arial";
      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "rgba(255, 230, 230, 0.95)";
      ctx.strokeText("급강하 주의!", lineX, 70);
      ctx.fillText("급강하 주의!", lineX, 70);
      ctx.restore();
    }

    function drawInvincibleEffect() {
      if (invincibleTimer <= 0 || gameOver) return;

      const centerX = player.x + player.width / 2;
      const centerY = player.y + player.height / 2;
      const pulse = (Math.sin(Date.now() / 85) + 1) / 2;
      const size = 150 + pulse * 18;

      ctx.save();
      ctx.globalAlpha = 0.42 + pulse * 0.12;

      if (invincibleEffectImg.complete && invincibleEffectImg.naturalWidth > 0) {
        ctx.drawImage(invincibleEffectImg, centerX - size / 2, centerY - size / 2, size, size);
      } else {
        ctx.beginPath();
        ctx.arc(centerX, centerY, size / 2, 0, Math.PI * 2);
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(120, 220, 255, 0.75)";
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawExplosionEffects() {
      for (const effect of explosionEffects) {
        if (!effect || !Number.isFinite(effect.x) || !Number.isFinite(effect.y) || !Number.isFinite(effect.radius) || !Number.isFinite(effect.maxTimer)) {
          continue;
        }

        const progress = Math.max(0, Math.min(1, effect.timer / effect.maxTimer));
        const radius = Math.max(1, Math.min(effect.radius * (1 - progress * 0.18), 380));
        const alpha = Math.max(0, Math.min(0.35, 0.35 * progress));

        // 큰 원 fill은 모바일에서 순간 렉 만들 수 있어서 테두리 + 중앙 플래시만 그림
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, radius, 0, Math.PI * 2);
        ctx.lineWidth = 8;
        ctx.strokeStyle = "rgba(255, 240, 120, " + alpha + ")";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(effect.x, effect.y, 70 * progress, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 230, 80, " + (alpha * 0.45) + ")";
        ctx.fill();
      }
    }

    function drawBonusTexts() {
      ctx.textAlign = "center";
      ctx.font = "28px Arial";
      ctx.lineWidth = 6;

      for (let i = 0; i < bonusTexts.length; i++) {
        const item = bonusTexts[i];
        const alpha = Math.min(1, item.timer / 25);
        const y = 125 + i * 36 - (item.maxTimer - item.timer) * 0.08;

        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "black";
        ctx.fillStyle = "white";
        ctx.strokeText(item.text, canvas.width / 2, y);
        ctx.fillText(item.text, canvas.width / 2, y);
        ctx.globalAlpha = 1;
      }
    }

    function drawBurnOverlay() {
      if (burnEffectTimer <= 0 || gameOver) return;

      const pulse = (Math.sin(Date.now() / 120) + 1) / 2;
      const alpha = 0.07 + pulse * 0.10;

      ctx.fillStyle = "rgba(255, 0, 0, " + alpha + ")";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.font = "22px Arial";
      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "rgba(255, 210, 210, 0.95)";
      ctx.strokeText("불뉴비 효과: " + Math.ceil(burnEffectTimer / 60) + "초", canvas.width / 2, 105);
      ctx.fillText("불뉴비 효과: " + Math.ceil(burnEffectTimer / 60) + "초", canvas.width / 2, 105);
    }

    function drawSlowOverlay() {
      if (slowTimer <= 0 || gameOver) return;

      const pulse = (Math.sin(Date.now() / 110) + 1) / 2;
      const alpha = 0.045 + pulse * 0.09;

      ctx.fillStyle = "rgba(255, 225, 0, " + alpha + ")";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.font = "22px Arial";
      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "rgba(255, 245, 170, 0.95)";
      ctx.strokeText("감속 효과: " + Math.ceil(slowTimer / 60) + "초", canvas.width / 2, 135);
      ctx.fillText("감속 효과: " + Math.ceil(slowTimer / 60) + "초", canvas.width / 2, 135);
    }

    function drawStunText() {
      if (stunTimer <= 0 || gameOver) return;

      ctx.textAlign = "center";
      ctx.font = "26px Arial";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
      ctx.strokeText("기절!", canvas.width / 2, 170);
      ctx.fillText("기절!", canvas.width / 2, 170);
    }

    function drawHpBar() {
      const barX = 20;
      const barY = 20;
      const barWidth = 230;
      const barHeight = 35;

      ctx.fillStyle = "black";
      ctx.fillRect(barX, barY, barWidth, barHeight);

      ctx.fillStyle = "lime";
      ctx.fillRect(barX, barY, barWidth * Math.max(0, Math.min(1, hp / maxHp)), barHeight);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 3;
      ctx.strokeRect(barX, barY, barWidth, barHeight);

      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "HP " + hp + " / " + maxHp,
        barX + barWidth / 2,
        barY + barHeight / 2
      );

      ctx.textBaseline = "alphabetic";
    }

    function drawScoreText() {
      ctx.font = "24px Arial";
      ctx.textAlign = "left";

      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.strokeText("점수: " + score, 20, 95);

      ctx.fillStyle = "white";
      ctx.fillText("점수: " + score, 20, 95);
    }

    function drawGameOverScreen() {
      ctx.drawImage(gameOverImg, 0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.font = "32px Arial";

      ctx.lineWidth = 6;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "white";

      ctx.strokeText("최근 점수: " + recentScore, canvas.width / 2, 560);
      ctx.fillText("최근 점수: " + recentScore, canvas.width / 2, 560);

      ctx.strokeText("최고 점수: " + bestScore, canvas.width / 2, 605);
      ctx.fillText("최고 점수: " + bestScore, canvas.width / 2, 605);

      if (showRetryButton) {
        const buttonImg = isHoverRetryButton ? retryButtonHoverImg : retryButtonImg;

        ctx.globalAlpha = retryButtonAlpha;
        ctx.drawImage(
          buttonImg,
          retryButton.x,
          retryButton.y,
          retryButton.width,
          retryButton.height
        );
        ctx.globalAlpha = 1;
      }
    }

    function startGame() {
      mainBgmStarted = true;
      resetGameplayValues();
      gameState = "play";
      canvas.style.cursor = "default";
      lastMoveTime = Date.now();

      showMobileControls();

      playPlayBgm();
    }

    function restartGame() {
      resetGameplayValues();
      canvas.style.cursor = "default";

      showMobileControls();

      playPlayBgm();
    }

    function isMouseOnButton(mouseX, mouseY, button) {
      return (
        mouseX >= button.x &&
        mouseX <= button.x + button.width &&
        mouseY >= button.y &&
        mouseY <= button.y + button.height
      );
    }

    function getCanvasPoint(e) {
      const rect = canvas.getBoundingClientRect();

      let clientX = e.clientX;
      let clientY = e.clientY;

      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
      }

      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function updateButtonHover(e) {
      const point = getCanvasPoint(e);

      if (gameState === "start" && showButton) {
        isHoverStartButton = isMouseOnButton(point.x, point.y, startButton);
      } else {
        isHoverStartButton = false;
      }

      if (gameState === "play" && gameOverPhase === "result" && showRetryButton) {
        isHoverRetryButton = isMouseOnButton(point.x, point.y, retryButton);
      } else {
        isHoverRetryButton = false;
      }
    }

    let lastCanvasPressTime = 0;

    function handleCanvasPress(e) {
      const now = Date.now();

      if (e && e.type === "click" && now - lastCanvasPressTime < 450) {
        return;
      }

      if (e && e.type !== "click") {
        lastCanvasPressTime = now;
      }

      if (e) {
        e.preventDefault();
      }

      unlockAudioByGesture();

      const point = getCanvasPoint(e);

      if (gameState === "start" && showButton) {
        if (isMouseOnButton(point.x, point.y, startButton)) {
          startGame();
          return;
        }
      }

      if (gameState === "play" && gameOverPhase === "result" && showRetryButton) {
        if (isMouseOnButton(point.x, point.y, retryButton)) {
          restartGame();
        }
      }
    }

    canvas.addEventListener("pointermove", updateButtonHover);

    canvas.addEventListener("pointerdown", handleCanvasPress, {
      passive: false
    });

    canvas.addEventListener("click", handleCanvasPress);

    canvas.addEventListener("mouseleave", function() {
      isHoverStartButton = false;
      isHoverRetryButton = false;
    });
  </script>
</body>
</html>
